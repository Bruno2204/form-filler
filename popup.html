<!DOCTYPE html>
<html>

  <head>
    <meta charset="UTF-8">
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 360px;
        padding: 14px;
      }

      textarea {
        width: 100%;
        height: 190px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 8px;
        box-sizing: border-box;
        resize: vertical;
      }

      .buttons {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        padding: 9px 4px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        color: white;
      }

      #btn1 {
        background: #4285f4;
      }

      #btn1:hover {
        background: #3367d6;
      }

      #btn2 {
        background: #0f9d58;
      }

      #btn2:hover {
        background: #0b8043;
      }

      #btn3 {
        background: #db4437;
      }

      #btn3:hover {
        background: #c53929;
      }

      #btnClear {
        background: #607d8b;
      }

      #btnClear:hover {
        background: #455a64;
      }

      #btnBackend {
        background: #ff9800;
        flex: none;
        width: 100%;
        margin-top: 6px;
      }

      #btnBackend:hover {
        background: #e68900;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
        min-height: 16px;
      }

      #preview {
        margin-top: 10px;
        font-size: 11px;
        color: #333;
        background: #f5f5f5;
        border-radius: 6px;
        padding: 8px;
        display: none;
      }

      #preview div {
        margin: 2px 0;
      }

      label {
        font-size: 12px;
        font-weight: bold;
        color: #333;
      }
    </style>
  </head>

  <body>
    <label>Pega los datos del cliente:</label><br><br>
    <textarea id="input" placeholder="POSPAGO CAC&#10;PLAN: Pro ilimitado&#10;..."></textarea>
    <div id="preview"></div>
    <div class="buttons">
      <button id="btn1">Página 1</button>
      <button id="btn2">Página 2</button>
      <button id="btn3">Página 3</button>
      <button id="btnClear">Borrar</button>
    </div>
    <div class="buttons">
      <button id="btnBackend">Usuario Backend</button>
    </div>
    <div id="status"></div>
    <script src="parser.js"></script>
    <script src="popup.js"></script>
  </body>

</html>
